---
# Managed by modulesync - DO NOT EDIT
# https://voxpupuli.org/docs/updating-files-managed-with-modulesync/

name: 📦 Build and Publish

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-and-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push-container:
    name: Build and publish container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Determine semantic-release version
        id: version
        run: |
          echo "version=$(jq -r '.dependencies.\"semantic-release\"' package.json | sed 's/\\^//')" >> "$GITHUB_OUTPUT"

      - name: Determine channel tag
        id: channel
        run: |
          echo "tag=$(echo '${{ github.ref_name }}' | sed 's/^main$/latest/')" >> "$GITHUB_OUTPUT"

      - name: Build and publish container
        id: build
        uses: voxpupuli/gha-build-and-publish-a-container@f1680271a3fd34267c1401c760a15f45a9cf34ca # v2.0.0
        with:
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          docker_username: voxpupulibot
          docker_password: ${{ secrets.DOCKERHUB_BOT_ADMIN_TOKEN }}
          build_arch: linux/amd64,linux/arm64
          build_context: .
          buildfile: Containerfile
          tags: |
            ghcr.io/voxpupuli/semantic-release:${{ steps.version.outputs.version }}-${{ steps.channel.outputs.tag }}
            ghcr.io/voxpupuli/semantic-release:latest
            docker.io/voxpupuli/semantic-release:${{ steps.version.outputs.version }}-${{ steps.channel.outputs.tag }}
            docker.io/voxpupuli/semantic-release:latest

  update-dockerhub-description:
    name: Update Docker Hub description
    runs-on: ubuntu-latest
    needs:
      - build-and-push-container
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: voxpupulibot
          password: ${{ secrets.DOCKERHUB_BOT_ADMIN_TOKEN }}
          repository: voxpupuli/semantic-release
